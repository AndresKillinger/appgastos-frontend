<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MapleGastos">
  <meta name="theme-color" content="#050510">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>MapleGastos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #050510;
      --surface:  #0d0d2b;
      --surface2: #1a1a40;
      --border:   #3333aa;
      --border-hi: #6666ff;
      --text:     #ffd700;
      --muted:    #8888cc;
      --green:    #00ee44;
      --red:      #ff3333;
      --blue:     #44aaff;
      --accent:   #cc44ff;
      --gold:     #ffaa00;
      --tab-h:    64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      overflow: hidden;
      image-rendering: pixelated;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── pixel box mixin ── */
    .px-box {
      background: var(--surface);
      border: 2px solid var(--border-hi);
      box-shadow: inset 2px 2px 0 var(--surface2), inset -2px -2px 0 #000,
                  4px 4px 0 #000;
    }

    /* ── Layout ── */
    #app {
      display: flex; flex-direction: column;
      height: 100%; padding-top: var(--safe-top);
    }

    /* ── Header ── */
    .header {
      padding: 10px 14px 8px;
      background: var(--surface);
      border-bottom: 3px solid var(--border);
      box-shadow: 0 3px 0 #000;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-text h1 {
      font-size: 11px; color: var(--gold);
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #aa6600;
      letter-spacing: 1px;
    }
    .header-text p { font-size: 7px; color: var(--muted); margin-top: 4px; }
    .btn-sync {
      background: var(--surface2);
      border: 2px solid var(--border-hi);
      box-shadow: 2px 2px 0 #000;
      border-radius: 0;
      padding: 6px 10px; color: var(--text);
      font-size: 16px; cursor: pointer; line-height: 1;
    }
    .btn-sync:active { transform: translate(2px,2px); box-shadow: none; }
    .btn-sync:disabled { opacity: .4; }

    /* ── Content ── */
    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--tab-h) + var(--safe-bot) + 8px);
      background:
        repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(50,50,120,.08) 31px, rgba(50,50,120,.08) 32px),
        repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(50,50,120,.08) 31px, rgba(50,50,120,.08) 32px),
        var(--bg);
    }
    .screen { padding: 12px; }
    .hidden { display: none !important; }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--tab-h) + var(--safe-bot));
      padding-bottom: var(--safe-bot);
      background: var(--surface);
      border-top: 3px solid var(--border);
      box-shadow: 0 -3px 0 #000;
      display: flex; align-items: center;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      background: none; border: none; color: var(--muted);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; cursor: pointer; padding: 8px 0;
    }
    .tab-btn .icon { font-size: 20px; line-height: 1; }
    .tab-btn.active { color: var(--gold); }
    .tab-btn.active .icon { filter: drop-shadow(0 0 4px var(--gold)); }

    /* ── Month nav ── */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .month-title {
      font-size: 10px; color: var(--gold);
      text-shadow: 1px 1px 0 #000;
    }
    .nav-btn {
      background: var(--surface2);
      border: 2px solid var(--border-hi);
      box-shadow: 2px 2px 0 #000;
      color: var(--text); font-size: 16px;
      width: 32px; height: 32px; cursor: pointer; line-height: 1;
      border-radius: 0;
    }
    .nav-btn:active { transform: translate(2px,2px); box-shadow: none; }

    /* ── HP / MP style cards ── */
    .cards-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 10px;
    }
    .card {
      background: var(--surface);
      border: 2px solid var(--border-hi);
      box-shadow: 3px 3px 0 #000;
      padding: 12px 10px;
    }
    .card-green { border-color: var(--green); }
    .card-red   { border-color: var(--red); }
    .card-label {
      font-size: 7px; color: var(--muted);
      text-transform: uppercase; margin-bottom: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .card-value { font-size: 11px; color: var(--text); line-height: 1.4; }
    .card-green .card-value { color: var(--green); text-shadow: 0 0 6px var(--green); }
    .card-red   .card-value { color: var(--red);   text-shadow: 0 0 6px var(--red); }
    .card-sub   { font-size: 7px; color: var(--muted); margin-top: 4px; }

    .balance-card {
      background: var(--surface);
      border: 2px solid var(--gold);
      box-shadow: 3px 3px 0 #000, 0 0 12px rgba(255,200,0,.15);
      padding: 16px 12px;
      margin-bottom: 16px; text-align: center;
    }
    .balance-card .card-label { justify-content: center; font-size: 8px; margin-bottom: 10px; }
    .balance-card .card-value { font-size: 16px; }
    .balance-card .card-sub { font-size: 7px; }
    .text-green-400 { color: var(--green); text-shadow: 0 0 8px var(--green); }
    .text-red-400   { color: var(--red);   text-shadow: 0 0 8px var(--red); }

    /* ── Section title ── */
    .section-title {
      font-size: 8px; color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Top list ── */
    .top-list { display: flex; flex-direction: column; gap: 3px; }
    .top-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 2px 2px 0 #000;
      padding: 10px;
    }
    .top-rank {
      font-size: 9px; color: var(--gold);
      width: 16px; text-align: center; flex-shrink: 0;
    }
    .top-info { flex: 1; min-width: 0; }
    .top-desc {
      font-size: 8px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.6;
    }
    .top-date { font-size: 7px; color: var(--muted); margin-top: 3px; }
    .top-monto { font-size: 8px; color: var(--red); flex-shrink: 0; text-shadow: 0 0 6px var(--red); }

    /* ── Movimientos ── */
    .mov-toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .filtros { display: flex; gap: 6px; }
    .filtro-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: 2px 2px 0 #000;
      color: var(--muted);
      padding: 6px 10px; font-size: 7px; cursor: pointer;
      font-family: 'Press Start 2P', monospace;
    }
    .filtro-btn.active {
      background: var(--accent); border-color: #aa00ff;
      color: white; box-shadow: 0 0 8px var(--accent);
    }
    .search-box {
      flex: 1; background: var(--surface);
      border: 2px solid var(--border);
      padding: 8px 10px; color: var(--gold);
      font-size: 9px; outline: none;
      font-family: 'Press Start 2P', monospace;
    }
    .search-box::placeholder { color: var(--muted); }
    .month-input {
      width: 100%; background: var(--surface);
      border: 2px solid var(--border);
      padding: 8px 10px; color: var(--gold);
      font-size: 9px; margin-bottom: 10px; outline: none;
      font-family: 'Press Start 2P', monospace;
    }

    .date-group { margin-bottom: 6px; }
    .date-header {
      font-size: 7px; color: var(--muted);
      padding: 6px 2px 4px; text-transform: uppercase;
      display: flex; align-items: center; gap: 4px;
    }
    .mov-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 2px 2px 0 #000;
      padding: 10px; margin-bottom: 2px;
    }
    .mov-item:hover { border-color: var(--border-hi); }
    .mov-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      image-rendering: pixelated;
    }
    .mov-info { flex: 1; min-width: 0; }
    .mov-desc {
      font-size: 8px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.6;
    }
    .mov-sub  { font-size: 7px; color: var(--muted); margin-top: 2px; }
    .mov-monto { font-size: 9px; font-weight: 700; flex-shrink: 0; }
    .monto-in  { color: var(--green); text-shadow: 0 0 6px var(--green); }
    .monto-out { color: var(--red);   text-shadow: 0 0 6px var(--red); }

    /* ── Formulario ── */
    .form-card {
      background: var(--surface);
      border: 2px solid var(--border-hi);
      box-shadow: 4px 4px 0 #000;
      padding: 16px 14px;
      margin-bottom: 14px;
    }
    .form-card h2 {
      font-size: 9px; color: var(--gold);
      margin-bottom: 14px;
      text-shadow: 1px 1px 0 #000;
      display: flex; align-items: center; gap: 6px;
    }
    .field { margin-bottom: 12px; }
    .field label {
      font-size: 7px; color: var(--muted); display: block;
      margin-bottom: 6px; text-transform: uppercase;
    }
    .field input {
      width: 100%; background: var(--bg);
      border: 2px solid var(--border);
      padding: 10px; color: var(--gold);
      font-size: 10px; outline: none; -webkit-appearance: none;
      font-family: 'Press Start 2P', monospace;
    }
    .field input:focus { border-color: var(--gold); box-shadow: 0 0 6px rgba(255,200,0,.3); }
    .btn-primary {
      width: 100%; background: var(--surface2);
      border: 2px solid var(--gold);
      box-shadow: 3px 3px 0 #000;
      padding: 14px; color: var(--gold);
      font-size: 9px; cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      text-shadow: 1px 1px 0 #000;
      transition: none;
    }
    .btn-primary:active { transform: translate(3px,3px); box-shadow: none; }
    .btn-primary:disabled { opacity: .4; }

    .shortcut-box {
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: 4px 4px 0 #000;
      padding: 16px 14px;
    }
    .shortcut-box h2 {
      font-size: 9px; color: var(--gold); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .shortcut-box p  { font-size: 8px; color: var(--muted); line-height: 2; }
    .shortcut-box code {
      background: var(--bg); padding: 2px 5px;
      font-size: 7px; color: var(--blue);
      border: 1px solid var(--border);
    }

    /* ── Estados ── */
    .loading, .empty, .error {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 9px; line-height: 2;
    }
    .error { color: var(--red); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--tab-h) + var(--safe-bot) + 16px);
      left: 50%; transform: translateX(-50%);
      background: var(--surface2);
      border: 2px solid var(--border-hi);
      box-shadow: 3px 3px 0 #000;
      padding: 10px 16px; font-size: 8px;
      z-index: 100; white-space: nowrap;
      animation: fadeUp .15s steps(3);
    }
    .toast-ok    { color: var(--green); border-color: var(--green); }
    .toast-error { color: var(--red);   border-color: var(--red); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Blink cursor ── */
    @keyframes blink { 50% { opacity: 0; } }
    .blink { animation: blink 1s step-end infinite; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-text">
      <h1>🍄 MapleGastos</h1>
      <p>▶ Cuenta Corriente Santander</p>
    </div>
    <button id="btn-sync" class="btn-sync" onclick="syncData()" title="Sincronizar cartolas">🔄</button>
  </div>

  <!-- Contenido -->
  <div class="content">

    <!-- Pantalla: Resumen -->
    <div id="screen-resumen" class="screen">
      <div id="resumen-content"><div class="loading">🐌 Cargando...</div></div>
    </div>

    <!-- Pantalla: Movimientos -->
    <div id="screen-movimientos" class="screen hidden">
      <input type="month" id="mes-selector" class="month-input" onchange="onMesMovChange(event)">
      <div class="mov-toolbar">
        <div class="filtros">
          <button class="filtro-btn" data-tipo="abono" onclick="setFiltro('abono')">💰 Drop</button>
          <button class="filtro-btn" data-tipo="cargo" onclick="setFiltro('cargo')">💥 Daño</button>
        </div>
        <input type="search" class="search-box" placeholder="🔍 Buscar..." oninput="onBuscar(event)">
      </div>
      <div id="mov-list"><div class="loading">🐌 Cargando...</div></div>
    </div>

    <!-- Pantalla: Agregar -->
    <div id="screen-agregar" class="screen hidden">

      <div class="form-card">
        <h2>🛒 Agregar gasto</h2>
        <form id="form-tc">
          <div class="field">
            <label>📅 Fecha</label>
            <input type="date" id="input-fecha" required>
          </div>
          <div class="field">
            <label>📝 Comercio</label>
            <input type="text" id="input-desc" placeholder="Ej: Starbucks" required>
          </div>
          <div class="field">
            <label>💰 Monto ($)</label>
            <input type="number" id="input-monto" placeholder="15000" inputmode="numeric" required>
          </div>
          <button type="submit" class="btn-primary" id="btn-agregar">⚔️ GUARDAR GASTO</button>
        </form>
      </div>

      <div class="shortcut-box">
        <h2>⚡ Atajo Apple Pay</h2>
        <p>
          Configura un atajo en iOS Shortcuts.<br>
          Cuando pagues con Apple Pay llama a:<br>
          <code>POST /api/v1/movements/credit-card</code><br>
          Atajos → Automatización → App → Wallet
        </p>
      </div>

    </div>
  </div>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="resumen">
      <span class="icon">📊</span>
      <span>STATS</span>
    </button>
    <button class="tab-btn" data-tab="movimientos">
      <span class="icon">👾</span>
      <span>LOG</span>
    </button>
    <button class="tab-btn" data-tab="agregar">
      <span class="icon">🛒</span>
      <span>SHOP</span>
    </button>
  </nav>

</div>
<script type="module" src="./js/app.js"></script>
</body>
</html>
