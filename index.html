<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MapleGastos">
  <meta name="theme-color" content="#050510">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <title>MapleGastos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #050510;
      --surface:   #0d0d2b;
      --surface2:  #1a1a40;
      --border:    #3333aa;
      --border-hi: #6666ff;
      --text:      #ffd700;
      --muted:     #9999cc;
      --green:     #00ee44;
      --red:       #ff3333;
      --blue:      #44aaff;
      --accent:    #cc44ff;
      --gold:      #ffaa00;
      --tab-h:     60px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
      /* Press Start 2P solo para títulos y números. VT323 para todo el resto. */
      --fp: 'Press Start 2P', monospace;
      --fb: 'VT323', monospace;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--fb); font-size: 18px;
      overflow: hidden; image-rendering: pixelated;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

    /* ── Header ── */
    .header {
      padding: 8px 12px 0; background: var(--surface);
      border-bottom: 3px solid var(--border); box-shadow: 0 3px 0 #000; flex-shrink: 0;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .header-text h1 { font-family: var(--fp); font-size: 11px; color: var(--gold); text-shadow: 2px 2px 0 #000, -1px -1px 0 #aa6600; }
    .header-text p  { font-size: 15px; color: var(--muted); margin-top: 2px; }
    .btn-sync {
      background: var(--surface2); border: 2px solid var(--border-hi);
      box-shadow: 2px 2px 0 #000; padding: 8px 12px;
      color: var(--text); font-size: 20px; cursor: pointer; line-height: 1;
    }
    .btn-sync:active { transform: translate(2px,2px); box-shadow: none; }
    .btn-sync:disabled { opacity: .4; }

    /* Desfile de monstruos */
    .monster-parade {
      display: flex; gap: 2px; align-items: flex-end;
      height: 44px; overflow: hidden;
      border-top: 1px solid var(--border); padding-top: 2px;
    }
    .header-mob {
      height: 40px; width: auto; image-rendering: pixelated;
      filter: drop-shadow(1px 1px 0 rgba(0,0,0,.9));
      animation: mobFloat 2s ease-in-out infinite;
    }
    .header-mob:nth-child(2) { animation-delay: .4s; }
    .header-mob:nth-child(3) { animation-delay: .8s; }
    .header-mob:nth-child(4) { animation-delay: 1.2s; }
    .header-mob:nth-child(5) { animation-delay: 1.6s; }
    @keyframes mobFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    /* ── Content ── */
    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--tab-h) + var(--safe-bot) + 16px);
      background:
        repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(50,50,120,.05) 31px,rgba(50,50,120,.05) 32px),
        repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(50,50,120,.05) 31px,rgba(50,50,120,.05) 32px),
        var(--bg);
    }
    .screen { padding: 12px; position: relative; overflow: hidden; }
    .hidden { display: none !important; }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--tab-h) + var(--safe-bot));
      padding-bottom: var(--safe-bot);
      background: var(--surface); border-top: 3px solid var(--border);
      box-shadow: 0 -3px 0 #000; display: flex; align-items: stretch; z-index: 100;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      background: none; border: none; color: var(--muted);
      font-family: var(--fp); font-size: 7px; cursor: pointer; padding: 8px 0;
    }
    .tab-btn .icon { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--gold); }
    .tab-btn.active .icon { filter: drop-shadow(0 0 4px var(--gold)); }

    /* ── Period nav (año + grilla meses) ── */
    .period-nav { margin-bottom: 10px; }
    .year-row { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 6px; }
    .year-label { font-family: var(--fp); font-size: 11px; color: var(--gold); min-width: 52px; text-align: center; }
    .nav-btn-sm {
      background: var(--surface2); border: 2px solid var(--border);
      color: var(--text); font-size: 14px; width: 32px; height: 32px; cursor: pointer; line-height: 1;
    }
    .nav-btn-sm:active { transform: translate(1px,1px); }
    .mes-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
    .mes-pill {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: var(--fp); font-size: 6px;
      padding: 7px 2px; cursor: pointer; text-align: center;
    }
    .mes-pill-active { background: var(--surface2); border-color: var(--gold); color: var(--gold); text-shadow: 0 0 4px var(--gold); }
    .mes-pill:active { opacity: .7; }

    /* ── Total card ── */
    .total-card {
      background: var(--surface); border: 2px solid var(--red);
      box-shadow: 3px 3px 0 #000; padding: 14px 12px; margin-bottom: 16px; text-align: center;
    }
    .total-label   { font-family: var(--fp); font-size: 8px; color: var(--muted); margin-bottom: 8px; }
    .total-value   { font-family: var(--fp); font-size: 20px; color: var(--red); text-shadow: 0 0 10px var(--red); margin-bottom: 4px; word-break: break-all; }
    .total-excluido{ font-size: 15px; color: var(--muted); margin-bottom: 4px; }
    .total-sub     { font-size: 15px; color: var(--muted); }

    /* ── Section title ── */
    .section-title {
      font-family: var(--fp); font-size: 8px; color: var(--gold);
      margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }

    /* ── Categorías del mes ── */
    .cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .cat-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: 2px 2px 0 #000; padding: 8px 10px;
    }
    .cat-row-icon { width: 28px; height: 28px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cat-row-body { flex: 1; min-width: 0; }
    .cat-row-header { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .cat-row-name  { font-size: 17px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-row-total { font-family: var(--fp); font-size: 8px; color: var(--text); flex-shrink: 0; }
    .cat-bar-bg    { height: 5px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 3px; }
    .cat-bar-fill  { height: 100%; transition: width .3s; }
    .cat-row-count { font-size: 14px; color: var(--muted); }

    /* ── Cat detail accordion ── */
    .cat-row { cursor: pointer; }
    .cat-row:active { opacity: .8; }
    .cat-detail { background: var(--bg); border: 1px solid var(--border); border-top: none; margin-bottom: 4px; overflow: hidden; }
    .cat-detail-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-bottom: 1px solid rgba(50,50,100,.3); font-size: 15px;
    }
    .cat-detail-row:last-child { border-bottom: none; }
    .cat-detail-fecha { color: var(--muted); font-size: 13px; flex-shrink: 0; width: 68px; }
    .cat-detail-desc  { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-detail-monto { font-family: var(--fp); font-size: 7px; color: var(--red); flex-shrink: 0; }
    .cat-detail-abono { color: var(--green) !important; }

    /* ── Mes a mes ── */
    .mes-list { display: flex; flex-direction: column; gap: 3px; }
    .mes-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 2px; cursor: pointer; border: 1px solid transparent; min-height: 30px;
    }
    .mes-row:active { background: var(--surface); }
    .mes-actual { border-color: var(--gold) !important; background: var(--surface); }
    .mes-row-label { font-size: 15px; color: var(--muted); width: 28px; flex-shrink: 0; }
    .mes-actual .mes-row-label { color: var(--gold); }
    .mes-bar-bg  { flex: 1; height: 7px; background: var(--surface2); border: 1px solid var(--border); }
    .mes-bar-fill{ height: 100%; background: var(--red); }
    .mes-row-total { font-family: var(--fp); font-size: 7px; color: var(--muted); width: 72px; text-align: right; flex-shrink: 0; }
    .mes-actual .mes-row-total { color: var(--gold); }

    /* ── Stacked bar chart (vertical) ── */
    .vstack-legend { display: grid; grid-template-columns: repeat(2,1fr); gap: 4px 10px; margin-bottom: 10px; }
    .vstack-legend-item { display: flex; align-items: center; gap: 7px; font-size: 15px; color: var(--text); }
    .vstack-legend-dot  { width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(255,255,255,.25); }
    .vstack-chart { display: flex; flex-direction: row; gap: 3px; height: 200px; }
    .vstack-col {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      cursor: pointer; min-width: 0;
    }
    .vstack-col:active { opacity: .7; }
    .vstack-col-active .vstack-label { color: var(--gold); }
    .vstack-col-active .vstack-total { color: var(--gold); }
    .vstack-total { font-family: var(--fp); font-size: 5px; color: var(--muted); height: 20px; display: flex; align-items: center; text-align: center; flex-shrink: 0; line-height: 1.2; overflow: hidden; }
    .vstack-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .vstack-bar  { width: 100%; display: flex; flex-direction: column-reverse; overflow: hidden; }
    .vstack-seg  { width: 100%; min-height: 2px; }
    .vstack-label { font-size: 12px; color: var(--muted); height: 18px; display: flex; align-items: center; flex-shrink: 0; }

    /* ── Movimientos ── */
    .mov-toolbar { display: flex; gap: 8px; margin-bottom: 6px; }
    .sort-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .sort-label { font-size: 14px; color: var(--muted); flex-shrink: 0; }
    .sort-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: var(--fp); font-size: 6px;
      padding: 6px 8px; cursor: pointer; flex: 1;
    }
    .sort-btn.active { background: var(--surface2); border-color: var(--gold); color: var(--gold); }
    .search-box {
      flex: 1; background: var(--surface); border: 2px solid var(--border);
      padding: 10px 12px; color: var(--gold); font-size: 17px; outline: none;
      font-family: var(--fb); -webkit-appearance: none;
    }
    .search-box::placeholder { color: var(--muted); }
    .badge-sin-cat {
      width: 100%; background: var(--surface2); border: 2px solid #ffaa00;
      box-shadow: 2px 2px 0 #000; color: #ffaa00; padding: 12px;
      font-family: var(--fp); font-size: 7px;
      cursor: pointer; margin-bottom: 10px; text-align: center;
      animation: pulseBorder 1.5s ease-in-out infinite;
    }
    @keyframes pulseBorder { 0%,100%{border-color:#ffaa00} 50%{border-color:#ff6600} }

    .date-group  { margin-bottom: 8px; }
    .date-header { font-size: 15px; color: var(--muted); padding: 6px 2px 4px; letter-spacing: 1px; }
    .mov-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: 2px 2px 0 #000; padding: 10px 10px; margin-bottom: 2px; cursor: pointer;
    }
    .mov-item:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #000; }
    .mov-icon  { font-size: 18px; flex-shrink: 0; padding-top: 2px; }
    .mov-info  { flex: 1; min-width: 0; }
    .mov-desc  { font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .mov-sub   { font-size: 15px; color: var(--muted); margin-top: 2px; }
    .mov-monto { font-family: var(--fp); font-size: 8px; flex-shrink: 0; padding-top: 4px; }
    .monto-in  { color: var(--green); text-shadow: 0 0 6px var(--green); }
    .monto-out { color: var(--red);   text-shadow: 0 0 6px var(--red); }
    .cat-badge {
      display: inline-block; margin-top: 4px; border: 1px solid;
      padding: 2px 8px; font-size: 15px; line-height: 1.4;
    }
    .cat-badge-sin { color: #ffaa00; border-color: #ffaa00; animation: pulseBorder 1.5s ease-in-out infinite; }
    .mov-sin-cat   { border-color: #ffaa00 !important; }
    .mov-tc        { border-left: 3px solid var(--accent) !important; }
    .mov-abono     { border-left: 3px solid var(--green) !important; }

    /* ── Filtro cuenta ── */
    .cuenta-bar { display: flex; gap: 6px; margin-bottom: 8px; }
    .cuenta-btn {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: var(--fp); font-size: 6px;
      padding: 7px 4px; cursor: pointer; text-align: center;
    }
    .cuenta-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

    /* ── Formulario agregar ── */
    .form-card { background: var(--surface); border: 2px solid var(--border-hi); box-shadow: 4px 4px 0 #000; padding: 16px 14px; margin-bottom: 14px; }
    .form-card h2 { font-family: var(--fp); font-size: 9px; color: var(--gold); margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field label { font-size: 15px; color: var(--muted); display: block; margin-bottom: 4px; }
    .field input {
      width: 100%; background: var(--bg); border: 2px solid var(--border);
      padding: 10px; color: var(--gold); font-size: 17px; outline: none;
      -webkit-appearance: none; font-family: var(--fb);
    }
    .field input:focus { border-color: var(--gold); }
    .btn-primary {
      width: 100%; background: var(--surface2); border: 2px solid var(--gold);
      box-shadow: 3px 3px 0 #000; padding: 14px; color: var(--gold);
      font-family: var(--fp); font-size: 9px; cursor: pointer;
    }
    .btn-primary:active { transform: translate(3px,3px); box-shadow: none; }
    .btn-primary:disabled { opacity: .4; }
    .shortcut-box { background: var(--surface); border: 2px solid var(--border); box-shadow: 4px 4px 0 #000; padding: 16px 14px; }
    .shortcut-box h2 { font-family: var(--fp); font-size: 9px; color: var(--gold); margin-bottom: 8px; }
    .shortcut-box p  { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
    .shortcut-box p strong { color: var(--text); }
    .shortcut-box code { background: var(--bg); padding: 2px 5px; font-size: 13px; color: var(--blue); border: 1px solid var(--border); word-break: break-all; }
    .shortcut-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .step { display: flex; gap: 10px; align-items: flex-start; font-size: 15px; color: var(--muted); line-height: 1.5; }
    .step strong { color: var(--text); }
    .step em { color: var(--gold); font-style: normal; }
    .step-n {
      font-family: var(--fp); font-size: 7px; color: var(--bg);
      background: var(--accent); min-width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
    }
    .step-url { flex-direction: column; }
    .step-url .step-n { margin-bottom: 4px; }
    .btn-copy {
      width: 100%; background: var(--surface2); border: 1px solid var(--blue);
      color: var(--blue); font-family: var(--fp); font-size: 7px; padding: 10px; cursor: pointer;
    }
    .btn-copy:active { opacity: .7; }

    /* ── Modal categorización ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.88);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-box {
      background: var(--surface); border: 2px solid var(--border-hi); border-bottom: none;
      box-shadow: 0 -4px 20px rgba(0,0,100,.5); width: 100%; max-width: 480px;
      max-height: 88vh; display: flex; flex-direction: column;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-body { overflow-y: auto; padding: 10px 16px 16px; flex: 1; }
    .modal-title   { font-family: var(--fp); font-size: 9px; color: var(--gold); }
    .modal-counter { font-size: 16px; color: var(--muted); }
    .modal-desc    { font-size: 18px; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
    .modal-monto        { font-family: var(--fp); font-size: 15px; color: var(--red); text-shadow: 0 0 8px var(--red); margin-bottom: 4px; }
    .modal-monto-abono  { color: var(--green) !important; text-shadow: 0 0 8px var(--green) !important; }
    .modal-fecha   { font-size: 15px; color: var(--muted); margin-bottom: 14px; }

    /* Grid de categorías */
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .cat-btn-wrap { position: relative; }
    .cat-btn {
      width: 100%; background: var(--surface2); border: 2px solid var(--border);
      box-shadow: 2px 2px 0 #000; padding: 10px 4px 8px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 82px;
    }
    .cat-btn:active { transform: translate(2px,2px); box-shadow: none; }
    .cat-btn-img { width: 36px; height: 36px; display:flex; align-items:center; justify-content:center; }
    .cat-name    { font-size: 14px; text-align: center; line-height: 1.2; }
    .cat-no-gasto{ border-color: #555566; opacity: .85; }
    /* Botón eliminar categoría */
    .cat-del {
      position: absolute; top: 2px; right: 2px; z-index: 10;
      background: rgba(200,30,30,.85); border: 1px solid #ff5555;
      color: #fff; font-size: 11px; width: 18px; height: 18px;
      cursor: pointer; line-height: 1; padding: 0; display: flex; align-items: center; justify-content: center;
    }
    .cat-del:active { opacity: .6; }

    /* Botones inferiores del modal */
    .modal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .btn-omitir {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: var(--fp); font-size: 7px; padding: 8px 12px; cursor: pointer;
    }
    .btn-nueva-cat {
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); font-family: var(--fp); font-size: 7px; padding: 8px 12px; cursor: pointer;
    }
    .btn-cerrar-modal { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; padding: 4px 10px; line-height: 1; }

    /* Formulario nueva categoría */
    .nueva-cat-form {
      margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px;
    }
    .nueva-cat-fields {
      display: grid; grid-template-columns: 1fr 50px auto 38px;
      gap: 6px; align-items: center; margin-bottom: 8px;
    }
    .nc-input {
      background: var(--bg); border: 1px solid var(--border); color: var(--gold);
      padding: 8px; font-family: var(--fb); font-size: 17px; outline: none; width: 100%;
    }
    .nc-icono { text-align: center; }
    .nc-label { font-size: 15px; color: var(--muted); display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .nc-color { width: 38px; height: 38px; padding: 2px; border: 1px solid var(--border); cursor: pointer; background: none; }

    /* ── Monstruos de fondo ── */
    .bg-mob {
      position: absolute; pointer-events: none; z-index: 0;
      image-rendering: pixelated; filter: saturate(0.5) brightness(0.8);
    }
    .bg-mob-zakum  { right: -20px; bottom: 30px;  height: 280px; opacity: 0.13; }
    .bg-mob-slime  { left:  -10px; bottom: 60px;  height: 190px; opacity: 0.11; }
    .bg-mob-slime2 { right:  10px; top:    20px;  height:  90px; opacity: 0.07; }
    #resumen-content, #mov-list, .mov-toolbar, .month-nav,
    .badge-sin-cat, .form-card, .shortcut-box { position: relative; z-index: 1; }

    /* ── Estados ── */
    .loading, .empty, .error { text-align:center; padding:40px 20px; font-size:17px; color:var(--muted); line-height:1.8; }
    .error { color: var(--red); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--tab-h) + var(--safe-bot) + 16px);
      left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 2px solid var(--border-hi);
      box-shadow: 3px 3px 0 #000; padding: 10px 16px;
      font-family: var(--fp); font-size: 8px;
      z-index: 300; white-space: nowrap; animation: fadeUp .15s steps(3);
    }
    .toast-ok    { color: var(--green); border-color: var(--green); }
    .toast-error { color: var(--red);   border-color: var(--red); }
    @keyframes fadeUp {
      from { opacity:0; transform:translateX(-50%) translateY(8px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-text">
        <h1>🍄 MapleGastos</h1>
        <p>▶ Cuenta Corriente Santander</p>
      </div>
      <button id="btn-sync" class="btn-sync" onclick="syncData()">🔄</button>
    </div>
    <div class="monster-parade">
      <img src="https://maplestory.io/api/GMS/latest/mob/130100/render/stand"  class="header-mob" onerror="this.style.display='none'" alt="">
      <img src="https://maplestory.io/api/GMS/latest/mob/100100/render/stand"  class="header-mob" onerror="this.style.display='none'" alt="">
      <img src="https://maplestory.io/api/GMS/latest/mob/210100/render/stand"  class="header-mob" onerror="this.style.display='none'" alt="">
      <img src="https://maplestory.io/api/GMS/latest/mob/8820001/render/stand" class="header-mob" onerror="this.style.display='none'" alt="">
      <img src="https://maplestory.io/api/GMS/latest/mob/8800000/render/stand" class="header-mob" onerror="this.style.display='none'" alt="">
    </div>
  </div>

  <!-- Contenido -->
  <div class="content">

    <div id="screen-resumen" class="screen">
      <img class="bg-mob bg-mob-zakum"
           src="https://maplestory.io/api/GMS/latest/mob/8800000/render/stand"
           onerror="this.style.display='none'" alt="">
      <img class="bg-mob bg-mob-slime2"
           src="https://maplestory.io/api/GMS/latest/mob/100100/render/stand"
           onerror="this.style.display='none'" alt="">
      <div id="resumen-content"><div class="loading">🐌 Cargando...</div></div>
    </div>

    <div id="screen-movimientos" class="screen hidden">
      <div id="mov-period-nav"></div>
      <div class="mov-toolbar">
        <input type="search" class="search-box" placeholder="🔍 Buscar gasto..." oninput="onBuscar(event)">
      </div>
      <div class="cuenta-bar">
        <button class="cuenta-btn active" data-cuenta="" onclick="setCuenta('')">🏦+💳 TODOS</button>
        <button class="cuenta-btn" data-cuenta="cc" onclick="setCuenta('cc')">🏦 CORRIENTE</button>
        <button class="cuenta-btn" data-cuenta="tc" onclick="setCuenta('tc')">💳 TARJETA</button>
      </div>
      <div class="sort-bar">
        <span class="sort-label">Orden:</span>
        <button class="sort-btn active" data-orden="fecha_desc" onclick="setOrden('fecha_desc')">📅 FECHA</button>
        <button class="sort-btn" data-orden="monto_desc" onclick="setOrden('monto_desc')">💰 MAYOR</button>
        <button class="sort-btn" data-orden="monto_asc" onclick="setOrden('monto_asc')">💰 MENOR</button>
      </div>
      <img class="bg-mob bg-mob-slime"
           src="https://maplestory.io/api/GMS/latest/mob/210100/render/stand"
           onerror="this.style.display='none'" alt="">
      <button id="badge-sin-cat" class="badge-sin-cat hidden" onclick="abrirModalCategoria()"></button>
      <div id="mov-list"><div class="loading">🐌 Cargando...</div></div>
    </div>


  </div>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="resumen"><span class="icon">📊</span><span>STATS</span></button>
    <button class="tab-btn" data-tab="movimientos"><span class="icon">👾</span><span>MOV</span></button>
  </nav>

</div>

<!-- Modal: categorizar -->
<div id="modal-categoria" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">⚔️ CATEGORIZAR</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="modal-contador" class="modal-counter"></span>
        <button class="btn-cerrar-modal" onclick="cerrarModal()">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div id="modal-desc" class="modal-desc"></div>
      <div id="modal-monto" class="modal-monto"></div>
      <div id="modal-fecha" class="modal-fecha"></div>
      <div id="cat-grid" class="cat-grid"></div>
      <div class="modal-actions">
        <button class="btn-omitir" onclick="omitirCategoria()">Omitir →</button>
        <button class="btn-nueva-cat" onclick="toggleNuevaCat()">➕ NUEVA CAT</button>
      </div>
      <div id="nueva-cat-form" class="nueva-cat-form hidden">
        <div class="nueva-cat-fields">
          <input id="nc-nombre" class="nc-input" placeholder="Nombre" type="text">
          <input id="nc-icono" class="nc-input nc-icono" placeholder="🎮" type="text" maxlength="2">
          <label class="nc-label"><input id="nc-es-gasto" type="checkbox" checked> gasto</label>
          <input id="nc-color" class="nc-color" type="color" value="#888888">
        </div>
        <button class="btn-primary" style="font-size:8px;padding:10px" onclick="guardarNuevaCat()">⚔️ CREAR CATEGORÍA</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
